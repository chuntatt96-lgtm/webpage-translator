<!DOCTYPE html>
<html>
<head>
  <title>Aly Live Translator</title>
  <style>
    body {
      width: 260px;
      padding: 10px;
      font-family: Arial;
    }
    select, button {
      width: 100%;
      padding: 8px;
      margin-top: 10px;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <select id="language">
    <option value="Japanese">Japanese</option>
    <option value="English">English</option>
    <option value="Chinese">Chinese</option>
    <option value="Korean">Korean</option>
    <option value="Spanish">Spanish</option>
    <option value="French">French</option>
  </select>

  <button id="translate">Start Live Translation</button>

  <script src="popup.js"></script>
</body>
</html>
